services:
  frontend:
    image: node:22-alpine
    container_name: codecoliseum-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_BACKEND_DOMAIN: http://localhost:5000
      NEXT_PUBLIC_BETTER_AUTH_BASE_URL: http://localhost:5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/codecoliseum?schema=public
      BETTER_AUTH_SECRET: replace-me
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - codecoliseum

volumes:
  frontend_node_modules:

networks:
  codecoliseum:
    name: codecoliseum
    driver: bridge
